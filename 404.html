<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página no encontrada | Adriana Rivera - Asesoría Legal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .error-content {
            padding: 200px 0 150px;
            text-align: center;
            min-height: 60vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .error-content h1 {
            font-size: 8rem;
            color: var(--accent-color);
            margin-bottom: 20px;
            line-height: 1;
            font-family: var(--font-heading);
        }
        .error-content h2 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            color: var(--primary-color);
        }
        .error-content p {
            color: var(--text-muted);
            margin-bottom: 40px;
            font-size: 1.2rem;
            max-width: 500px;
        }
    </style>
</head>

<body>

    <!-- Header Component -->
    <app-header></app-header>

    <main class="error-content">
        <div class="container">
            <h1>404</h1>
            <h2>Página no encontrada</h2>
            <p>Lo sentimos, la página que estás buscando no existe, ha sido movida o está temporalmente indisponible.</p>
            <a href="/index.html" class="btn btn-primary">Volver al Inicio</a>
        </div>
    </main>

    <!-- Footer Component -->
    <app-footer></app-footer>

    <script src="/components.js"></script>
    <script src="/script.js" defer></script>
</body>

</html>
